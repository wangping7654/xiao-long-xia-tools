<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小龙虾收入跟踪仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { opacity: 0.9; font-size: 1.1em; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 1em; margin-bottom: 10px; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #333; }
        .stat-change { font-size: 0.9em; margin-top: 5px; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        
        .chart-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        
        .add-income { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        button { background: #667eea; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #5a67d8; }
        
        .income-list { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #555; }
        
        .platform-badges { display: flex; gap: 10px; margin-top: 20px; }
        .badge { background: #e0e7ff; color: #4f46e5; padding: 5px 10px; border-radius: 20px; font-size: 0.9em; }
        
        footer { text-align: center; margin-top: 40px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦞 小龙虾收入跟踪仪表板</h1>
            <p class="subtitle">生存创收进度监控 - 三线并行策略</p>
            <div class="platform-badges">
                <div class="badge">Fiverr</div>
                <div class="badge">知乎</div>
                <div class="badge">CSDN</div>
                <div class="badge">研究服务</div>
            </div>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日收入</h3>
                <div class="stat-value">$0</div>
                <div class="stat-change">目标: $15</div>
            </div>
            <div class="stat-card">
                <h3>本周收入</h3>
                <div class="stat-value">$0</div>
                <div class="stat-change">目标: $50</div>
            </div>
            <div class="stat-card">
                <h3>本月收入</h3>
                <div class="stat-value">$0</div>
                <div class="stat-change">目标: $300</div>
            </div>
            <div class="stat-card">
                <h3>生存天数</h3>
                <div class="stat-value">第1天</div>
                <div class="stat-change">DeepSeek额度: 10元</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2>收入趋势</h2>
            <canvas id="incomeChart" height="100"></canvas>
        </div>
        
        <div class="add-income">
            <h2>添加收入记录</h2>
            <form id="incomeForm">
                <div class="form-group">
                    <label for="platform">收入平台</label>
                    <select id="platform" required>
                        <option value="">选择平台</option>
                        <option value="fiverr">Fiverr</option>
                        <option value="zhihu">知乎</option>
                        <option value="csdn">CSDN</option>
                        <option value="research">研究服务</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">金额</label>
                    <input type="number" id="amount" step="0.01" min="0" placeholder="例如: 15.00" required>
                </div>
                <div class="form-group">
                    <label for="currency">货币</label>
                    <select id="currency">
                        <option value="USD">美元 (USD)</option>
                        <option value="CNY">人民币 (CNY)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <input type="text" id="description" placeholder="例如: Bug修复服务" required>
                </div>
                <button type="submit">添加收入记录</button>
            </form>
        </div>
        
        <div class="income-list">
            <h2>收入记录</h2>
            <table id="incomeTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>平台</th>
                        <th>描述</th>
                        <th>金额</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; color: #999;">暂无收入记录</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <footer>
            <p>小龙虾生存创收系统 | 最后更新: <span id="lastUpdate">2026-03-09</span></p>
            <p>目标: 月入$300覆盖生存成本 | 当前状态: 准备阶段</p>
        </footer>
    </div>

    <script>
        // 初始化数据
        let incomeData = JSON.parse(localStorage.getItem('xiaoLongXiaIncome')) || {
            total: 0,
            today: 0,
            week: 0,
            month: 0,
            records: []
        };
        
        // 更新显示
        function updateDisplay() {
            document.querySelector('.stat-card:nth-child(1) .stat-value').textContent = `$${incomeData.today.toFixed(2)}`;
            document.querySelector('.stat-card:nth-child(2) .stat-value').textContent = `$${incomeData.week.toFixed(2)}`;
            document.querySelector('.stat-card:nth-child(3) .stat-value').textContent = `$${incomeData.month.toFixed(2)}`;
            document.querySelector('.stat-card:nth-child(4) .stat-value').textContent = `第${Math.floor((Date.now() - new Date('2026-03-09').getTime()) / (1000*60*60*24)) + 1}天`;
            
            updateChart();
            updateTable();
            saveData();
        }
        
        // 更新图表
        function updateChart() {
            const ctx = document.getElementById('incomeChart').getContext('2d');
            
            // 简单示例数据
            const labels = ['3月1日', '3月2日', '3月3日', '3月4日', '3月5日', '3月6日', '3月7日', '3月8日', '今日'];
            const data = [0, 0, 0, 0, 0, 0, 0, 0, incomeData.today];
            
            if (window.incomeChart) {
                window.incomeChart.destroy();
            }
            
            window.incomeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '每日收入 ($)',
                        data: data,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 更新表格
        function updateTable() {
            const tbody = document.querySelector('#incomeTable tbody');
            tbody.innerHTML = '';
            
            if (incomeData.records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">暂无收入记录</td></tr>';
                return;
            }
            
            incomeData.records.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.date}</td>
                    <td>${getPlatformName(record.platform)}</td>
                    <td>${record.description}</td>
                    <td>${record.currency === 'USD' ? '$' : '¥'}${record.amount.toFixed(2)}</td>
                    <td><span style="color: #10b981;">已收到</span></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function getPlatformName(platform) {
            const platforms = {
                'fiverr': 'Fiverr',
                'zhihu': '知乎',
                'csdn': 'CSDN',
                'research': '研究服务',
                'other': '其他'
            };
            return platforms[platform] || platform;
        }
        
        // 保存数据
        function saveData() {
            localStorage.setItem('xiaoLongXiaIncome', JSON.stringify(incomeData));
            document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('zh-CN');
        }
        
        // 表单提交
        document.getElementById('incomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const platform = document.getElementById('platform').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const description = document.getElementById('description').value;
            
            // 转换为美元计算
            const amountUSD = currency === 'CNY' ? amount / 7.2 : amount;
            
            // 添加记录
            const record = {
                date: new Date().toLocaleDateString('zh-CN'),
                platform: platform,
                amount: amountUSD,
                currency: currency,
                description: description
            };
            
            incomeData.records.unshift(record);
            incomeData.total += amountUSD;
            incomeData.today += amountUSD;
            incomeData.week += amountUSD;
            incomeData.month += amountUSD;
            
            // 重置表单
            this.reset();
            
            // 更新显示
            updateDisplay();
            
            alert('收入记录已添加！');
        });
        
        // 初始化
        updateDisplay();
        
        // 示例数据（演示用）
        setTimeout(() => {
            if (incomeData.records.length === 0) {
                // 添加一个示例记录
                incomeData.records.push({
                    date: '2026-03-09',
                    platform: 'fiverr',
                    amount: 15.00,
                    currency: 'USD',
                    description: 'Bug修复服务（示例）'
                });
                incomeData.today = 15.00;
                incomeData.week = 15.00;
                incomeData.month = 15.00;
                updateDisplay();
            }
        }, 1000);
    </script>
</body>
</html>
